<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Greaves Air-Conditioning — Climate, engineered.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Greaves Air-Conditioning — Modern Landing
   Type: Manrope + Instrument Serif (display) + JetBrains Mono (label)
   Palette: warm-light off-white, ink navy, electric cool blue, ember amber
============================================================ */

:root {
  --bg: #F6F4EF;          /* warm light off-white */
  --bg-2: #EFEBE2;        /* slightly deeper for sections */
  --paper: #FFFFFF;
  --ink: #0E1116;         /* near-black ink */
  --ink-2: #2A2F38;
  --muted: #6B7280;
  --line: #E5E1D6;
  --line-2: #D8D2C2;

  /* Cool/Warm accent system */
  --cool: oklch(0.58 0.18 245);    /* electric cool blue */
  --cool-soft: oklch(0.92 0.05 245);
  --cool-deep: oklch(0.32 0.12 250);
  --warm: oklch(0.72 0.15 60);      /* amber ember */
  --warm-soft: oklch(0.94 0.05 75);

  --radius-s: 8px;
  --radius-m: 14px;
  --radius-l: 22px;
  --radius-xl: 32px;

  --shadow-sm: 0 1px 2px rgba(14,17,22,0.04), 0 2px 8px rgba(14,17,22,0.04);
  --shadow-md: 0 6px 24px rgba(14,17,22,0.08), 0 1px 3px rgba(14,17,22,0.06);
  --shadow-lg: 0 30px 60px -20px rgba(14,17,22,0.18), 0 12px 24px -8px rgba(14,17,22,0.08);

  --font-sans: 'Manrope', system-ui, -apple-system, sans-serif;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  --max: 1280px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
img { max-width: 100%; display: block; }

::selection { background: var(--cool); color: white; }

/* ============================================================
   Utilities
============================================================ */
.container {
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 32px;
}
@media (max-width: 720px) {
  .container { padding: 0 20px; }
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-2);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 28px;
  height: 1px;
  background: currentColor;
}

.serif {
  font-family: var(--font-serif);
  font-weight: 400;
  font-style: italic;
  letter-spacing: -0.01em;
}

.section-title {
  font-size: clamp(40px, 5.4vw, 76px);
  line-height: 1.02;
  letter-spacing: -0.03em;
  font-weight: 600;
  text-wrap: balance;
}

.section-head {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 40px;
  margin-bottom: 56px;
  flex-wrap: wrap;
}

.section-head .lead {
  max-width: 420px;
  color: var(--muted);
  font-size: 17px;
  line-height: 1.55;
}

section { padding: 120px 0; position: relative; }
@media (max-width: 720px) { section { padding: 80px 0; } }

/* ============================================================
   Buttons
============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.01em;
  transition: transform .25s ease, background .25s ease, color .25s ease, box-shadow .25s ease;
  position: relative;
  overflow: hidden;
}
.btn-primary {
  background: var(--ink);
  color: var(--bg);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.btn-ghost {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--line-2);
}
.btn-ghost:hover { background: var(--paper); }

.btn .arrow {
  width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: transform .25s ease;
}
.btn:hover .arrow { transform: translateX(3px); }

/* ============================================================
   Reveal animation
============================================================ */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1);
}
.reveal.in { opacity: 1; transform: translateY(0); }
.reveal-stagger > * { transition-delay: calc(var(--i, 0) * 80ms); }

/* ============================================================
   Nav
============================================================ */
.nav {
  position: fixed;
  top: 16px;
  left: 0; right: 0;
  z-index: 50;
  pointer-events: none;
}
.nav-inner {
  max-width: calc(var(--max) + 64px);
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: auto;
}
.nav-pill {
  background: rgba(246,244,239,.78);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid rgba(216,210,194,.5);
  border-radius: 999px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 4px;
  box-shadow: var(--shadow-sm);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 18px 8px 14px;
  border-right: 1px solid var(--line);
  margin-right: 8px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.nav-logo-img {
  height: 36px;
  width: auto;
  display: block;
}
.nav-logo .mark {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--ink);
  position: relative;
  overflow: hidden;
}
.nav-logo .mark::before {
  content: "";
  position: absolute;
  inset: 4px;
  background:
    repeating-linear-gradient(0deg, transparent 0 2px, var(--bg) 2px 3px);
  opacity: .8;
}
.nav-logo .mark::after {
  content: "";
  position: absolute;
  width: 6px; height: 6px;
  background: var(--warm);
  border-radius: 50%;
  bottom: 4px; right: 4px;
  box-shadow: 0 0 10px var(--warm);
}
.nav-links {
  display: flex; gap: 2px;
}
.nav-links a {
  padding: 9px 14px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-2);
  transition: background .2s, color .2s;
  white-space: nowrap;
}
.nav-links a:hover { background: rgba(14,17,22,.05); color: var(--ink); }
.nav-cta {
  background: rgba(246,244,239,.78);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(216,210,194,.5);
  border-radius: 999px;
  padding: 6px 8px 6px 22px;
  display: flex; align-items: center; gap: 12px;
  font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-sm);
}
.nav-cta .pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: oklch(0.7 0.18 145);
  position: relative;
  margin-right: -4px;
}
.nav-cta .pulse::before {
  content: ""; position: absolute; inset: -4px;
  border-radius: 50%;
  background: oklch(0.7 0.18 145);
  opacity: .4;
  animation: pulse 1.8s ease-out infinite;
}
@keyframes pulse {
  0% { transform: scale(1); opacity: .5; }
  100% { transform: scale(2.5); opacity: 0; }
}
.nav-cta .btn-mini {
  background: var(--ink); color: var(--bg);
  padding: 8px 14px; border-radius: 999px;
  font-size: 13px; font-weight: 600;
}
.menu-toggle { display: none; }

@media (max-width: 1100px) {
  .nav-links { display: none; }
  .nav-cta .label { display: none; }
}
@media (max-width: 720px) {
  .nav-pill { padding: 8px 10px; }
  .nav-logo { padding: 6px 12px 6px 10px; }
}

/* ============================================================
   Hero
============================================================ */
.hero {
  min-height: 100vh;
  padding-top: 140px;
  padding-bottom: 80px;
  position: relative;
  overflow: hidden;
}

.hero-video {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.hero-video video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.hero-video-overlay {
  position: absolute;
  inset: 0;
  background: rgba(240, 237, 230, 0.55);
}

.hero-mesh {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.hero-mesh::before,
.hero-mesh::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: .55;
  mix-blend-mode: multiply;
  animation: float 18s ease-in-out infinite;
}
.hero-mesh::before {
  width: 720px; height: 720px;
  background: radial-gradient(circle at 30% 30%, oklch(0.78 0.13 240), transparent 60%);
  top: -200px; right: -120px;
}
.hero-mesh::after {
  width: 620px; height: 620px;
  background: radial-gradient(circle at 30% 30%, oklch(0.86 0.10 70), transparent 60%);
  bottom: -200px; left: -100px;
  animation-delay: -9s;
  animation-duration: 22s;
}
@keyframes float {
  0%, 100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(40px,-30px) scale(1.05); }
  66% { transform: translate(-30px,20px) scale(0.95); }
}

/* Vent slats overlay */
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, rgba(14,17,22,.04) 1px, transparent 1px);
  background-size: 80px 100%;
  mask-image: linear-gradient(to bottom, rgba(0,0,0,.4), transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.hero-content {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 80px;
  align-items: end;
}
@media (max-width: 980px) {
  .hero-content { grid-template-columns: 1fr; gap: 48px; }
}

.hero-headline {
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: clamp(50px, 8.6vw, 140px);
  line-height: 1;
  letter-spacing: -0.045em;
  font-weight: 700;
}
.hero-headline .word {
  display: inline-block;
  overflow: visible;
  vertical-align: bottom;
}
.hero-headline .word > span {
  display: inline-block;
  transform: translateY(110%);
  animation: heroIn .9s cubic-bezier(.2,.8,.2,1) forwards;
  animation-delay: calc(var(--d, 0) * 90ms);
}
@keyframes heroIn {
  to { transform: translateY(0); }
}
.hero-headline .accent {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  color: var(--cool-deep);
  letter-spacing: -0.02em;
}
.hero-logo-mark {
  display: inline-block;
  vertical-align: -0.06em;
  height: 0.65em;
  width: auto;
}
.hero-headline .swatch {
  display: inline-block;
  vertical-align: -0.06em;
  width: 0.8em; height: 0.65em;
  border-radius: 0.18em;
  background: linear-gradient(135deg, var(--warm), oklch(0.78 0.16 45));
  margin: 0 0.06em;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.05);
}
.hero-headline .swatch::after {
  content: "";
  position: absolute;
  inset: 18% 14%;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,.5) 0 2px, transparent 2px 5px);
}

.hero-meta {
  display: flex;
  flex-direction: column;
  gap: 28px;
  padding-bottom: 12px;
}
.hero-meta p {
  font-size: 18px;
  line-height: 1.5;
  color: var(--ink-2);
  max-width: 380px;
}
.hero-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.hero-strip {
  position: relative;
  z-index: 2;
  margin-top: 80px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.hero-strip-item {
  padding: 22px 28px;
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 6px;
  align-items: center;
  text-align: center;
}
.hero-strip-item:last-child { border-right: none; padding-right: 0; }
.hero-strip-item .k {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #fff;
}
.hero-strip-item .v {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
@media (max-width: 720px) {
  .hero-strip { grid-template-columns: repeat(2, 1fr); }
  .hero-strip-item:nth-child(2) { border-right: none; }
  .hero-strip-item { padding: 18px; border-bottom: 1px solid var(--line); }
}

/* Floating chip in hero */
.hero-chip {
  position: absolute;
  z-index: 2;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px 12px 14px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 999px;
  box-shadow: var(--shadow-md);
  font-size: 13px; font-weight: 500;
  animation: bob 6s ease-in-out infinite;
}
.hero-chip .dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--cool);
  position: relative;
}
.hero-chip .dot::before {
  content: "";
  position: absolute; inset: -3px;
  border-radius: 50%;
  border: 1px solid var(--cool);
  opacity: .4;
  animation: ring 2.4s ease-out infinite;
}
@keyframes ring {
  0% { transform: scale(.8); opacity: .6; }
  100% { transform: scale(2.2); opacity: 0; }
}
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.hero-chip.t1 { top: 200px; right: 6%; }
.hero-chip.t2 { bottom: 220px; right: 18%; animation-delay: -3s; }
@media (max-width: 980px) {
  .hero-chip.t1 { top: auto; bottom: 40px; right: 20px; }
  .hero-chip.t2 { display: none; }
}

/* ============================================================
   Marquee
============================================================ */
.marquee {
  overflow: hidden;
  border-block: 1px solid var(--line);
  background: var(--bg);
  padding: 22px 0;
}
.marquee-track {
  display: flex;
  gap: 64px;
  animation: marquee 40s linear infinite;
  width: max-content;
}
.marquee:hover .marquee-track { animation-play-state: paused; }
.marquee-item {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink-2);
  white-space: nowrap;
}
.marquee-item .ico {
  width: 14px; height: 14px;
  background: var(--warm);
  border-radius: 50%;
  flex: none;
}
.marquee-item.alt .ico { background: var(--cool); }
.marquee-item.alt { font-family: var(--font-serif); font-style: italic; color: var(--ink); }
@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ============================================================
   Brands section
============================================================ */
.brands {
  background: var(--bg-2);
}
.brands-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 820px) { .brands-grid { grid-template-columns: 1fr; } }

.brand-card {
  position: relative;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-l);
  padding: 40px;
  overflow: hidden;
  min-height: 380px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: transform .4s cubic-bezier(.2,.7,.2,1), box-shadow .4s;
}
.brand-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
}
.brand-card-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  opacity: 0;
  transition: opacity .5s;
}
.brand-card:hover .brand-card-bg { opacity: 1; }
.brand-card.cool .brand-card-bg {
  background: radial-gradient(circle at 80% 0%, var(--cool-soft), transparent 60%);
}
.brand-card.warm .brand-card-bg {
  background: radial-gradient(circle at 80% 0%, var(--warm-soft), transparent 60%);
}
.brand-card > * { position: relative; z-index: 1; }

.brand-card-header { display: flex; justify-content: space-between; align-items: start; gap: 16px; }
.brand-card-num {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: .12em;
  color: var(--muted);
}
.brand-logo-placeholder {
  font-family: var(--font-sans);
  font-size: 56px;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  color: var(--ink);
}
.brand-card.cool .brand-logo-placeholder { color: var(--cool-deep); }
.brand-card .tag {
  display: inline-block;
  font-size: 12px;
  font-family: var(--font-mono);
  letter-spacing: .1em;
  color: var(--muted);
  margin-top: 6px;
}
.brand-card .desc {
  font-size: 17px;
  color: var(--ink-2);
  max-width: 380px;
  line-height: 1.5;
  margin-top: 14px;
}
.brand-card .row {
  display: flex; justify-content: space-between; align-items: end; gap: 16px;
  margin-top: 24px;
}
.brand-card .arrow-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  transition: transform .3s, background .3s;
}
.brand-card:hover .arrow-btn { transform: rotate(-45deg); }
.brand-card.cool:hover .arrow-btn { background: var(--cool-deep); }

.brand-card .specs {
  display: flex; flex-direction: column; gap: 6px;
  font-family: var(--font-mono); font-size: 12px;
  color: var(--muted); letter-spacing: .05em;
}
.brand-card .specs span strong { color: var(--ink); font-weight: 600; }

/* ============================================================
   Services
============================================================ */
.services-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 20px;
}
.service {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-l);
  padding: 32px;
  position: relative;
  overflow: hidden;
  transition: transform .4s, box-shadow .4s, border-color .4s;
}
.service:hover {
  transform: translateY(-4px);
  border-color: var(--line-2);
  box-shadow: var(--shadow-md);
}
.s1 { grid-column: span 7; min-height: 320px; }
.s2 { grid-column: span 5; min-height: 320px; background: var(--ink); color: var(--bg); border-color: var(--ink); }
.s3 { grid-column: span 4; min-height: 280px; }
.s4 { grid-column: span 4; min-height: 280px; background: var(--cool-deep); color: var(--bg); border-color: var(--cool-deep); }
.s5 { grid-column: span 4; min-height: 280px; }
@media (max-width: 980px) {
  .s1, .s2, .s3, .s4, .s5 { grid-column: span 12; }
}
.service .num {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: .12em;
  opacity: .7;
}
.service h3 {
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin-top: 12px;
}
.service h3 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.service p {
  font-size: 15px; line-height: 1.5;
  margin-top: 14px;
  opacity: .8;
  max-width: 360px;
}
.service .visual {
  position: absolute;
  right: -10px; bottom: -10px;
  width: 110px; height: 110px;
  opacity: .9;
  pointer-events: none;
  z-index: 0;
}
.service .num,
.service h3,
.service p {
  position: relative;
  z-index: 1;
}

/* svg-y visual decorations */
.viz-coil {
  border-radius: 50%;
  border: 12px solid currentColor;
  width: 160px; height: 160px;
  opacity: .15;
  animation: spin 18s linear infinite;
  mask: radial-gradient(circle, transparent 35%, black 36%);
}
@keyframes spin { to { transform: rotate(360deg); } }
.viz-vent {
  width: 220px; height: 140px;
  background: repeating-linear-gradient(
    20deg,
    currentColor 0 6px,
    transparent 6px 22px
  );
  opacity: .12;
  border-radius: 24px;
}
.viz-thermo {
  width: 200px; height: 200px;
  border-radius: 50%;
  background:
    conic-gradient(from -90deg, currentColor 0 70%, transparent 70%);
  opacity: .12;
  -webkit-mask: radial-gradient(circle, transparent 38%, black 39%);
          mask: radial-gradient(circle, transparent 38%, black 39%);
}

/* ============================================================
   Projects
============================================================ */
.projects {
  background: var(--bg-2);
}
.projects-list {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--line-2);
}
.project {
  display: grid;
  grid-template-columns: 80px 1.6fr 1fr 1fr 60px;
  gap: 28px;
  align-items: center;
  padding: 28px 8px;
  border-bottom: 1px solid var(--line-2);
  position: relative;
  cursor: pointer;
  transition: padding .35s ease;
}
.project:hover { padding-left: 24px; }
.project::before {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--paper);
  z-index: -1;
  opacity: 0;
  transition: opacity .35s;
  border-radius: var(--radius-m);
}
.project:hover::before { opacity: 1; }

.project .num {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--muted);
}
.project .title {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.project .title em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.project .meta {
  font-size: 14px; color: var(--muted);
  font-family: var(--font-mono);
}
.project .arrow {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--line-2);
  display: flex; align-items: center; justify-content: center;
  justify-self: end;
  transition: transform .3s, background .3s, color .3s, border-color .3s;
}
.project:hover .arrow {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
  transform: rotate(-45deg);
}

.project-preview {
  position: fixed;
  pointer-events: none;
  width: 320px; height: 220px;
  background: var(--paper);
  border-radius: var(--radius-m);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  z-index: 30;
  transform: translate(-50%, -50%) scale(.96);
  opacity: 0;
  transition: opacity .25s, transform .25s;
}
.project-preview.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

.project-preview .ph {
  width: 100%; height: 100%;
  background: var(--bg-2);
  background-image:
    repeating-linear-gradient(45deg, var(--line) 0 1px, transparent 1px 14px),
    radial-gradient(circle at 30% 30%, var(--cool-soft), transparent 60%);
  display: flex; align-items: end; padding: 20px;
  font-family: var(--font-mono); font-size: 11px; color: var(--muted);
  letter-spacing: .1em;
}

@media (max-width: 820px) {
  .project { grid-template-columns: 1fr 60px; }
  .project .num, .project .meta:first-of-type { display: none; }
}

/* ============================================================
   Stats / Big number
============================================================ */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-block: 1px solid var(--line);
}
.stat {
  padding: 56px 28px;
  border-right: 1px solid var(--line);
  position: relative;
  overflow: hidden;
}
.stat:last-child { border-right: none; }
.stat .v {
  font-size: clamp(56px, 6vw, 92px);
  font-weight: 600;
  letter-spacing: -0.04em;
  line-height: 1;
  display: flex; align-items: baseline; gap: 6px;
}
.stat .v .unit { font-size: 24px; color: var(--muted); }
.stat .l {
  margin-top: 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}
.stat:hover .v { color: var(--cool-deep); }
.stat { transition: background .4s; }
.stat:hover { background: var(--paper); }

@media (max-width: 820px) {
  .stats { grid-template-columns: 1fr 1fr; }
  .stat:nth-child(2) { border-right: none; }
  .stat { border-bottom: 1px solid var(--line); }
}

/* ============================================================
   Values section
============================================================ */
.values {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: start;
}
@media (max-width: 980px) { .values { grid-template-columns: 1fr; gap: 40px; } }

.values .lead {
  font-family: var(--font-serif);
  font-size: clamp(28px, 3.4vw, 44px);
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.values .lead .underline {
  text-decoration: underline;
  text-decoration-color: var(--warm);
  text-decoration-thickness: 2px;
  text-underline-offset: 6px;
}

.values-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--radius-l);
  overflow: hidden;
}
.value {
  background: var(--bg);
  padding: 32px;
  transition: background .3s;
}
.value:hover { background: var(--paper); }
.value .icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--bg-2);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  font-family: var(--font-mono); font-weight: 600;
  color: var(--ink);
}
.value h4 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}
.value h4 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.value p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.5;
}

/* ============================================================
   Clients
============================================================ */
.clients {
  background: var(--bg-2);
  padding-bottom: 80px;
}
.client-grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--radius-l);
  overflow: hidden;
}
@media (max-width: 980px) { .client-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 540px) { .client-grid { grid-template-columns: repeat(3, 1fr); } }

.client-cell {
  background: var(--paper);
  height: 120px;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  transition: background .3s;
}
.client-cell:hover { background: var(--bg-2); }
.client-cell img {
  max-width: 100%;
  max-height: 56px;
  width: auto;
  height: auto;
  object-fit: contain;
  filter: grayscale(1);
  opacity: .55;
  transition: filter .3s, opacity .3s;
}
.client-cell:hover img { filter: grayscale(0); opacity: 1; }

/* ============================================================
   Coverage
============================================================ */
.coverage-head {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 40px;
  margin-bottom: 56px;
  flex-wrap: wrap;
}
.coverage-head h2 {
  font-size: clamp(40px, 4.6vw, 64px);
  line-height: 1;
  letter-spacing: -0.03em;
  font-weight: 600;
  margin-top: 18px;
}
.coverage-head h2 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.coverage-head .lead {
  max-width: 380px;
  color: var(--muted);
  font-size: 17px;
  line-height: 1.55;
  margin-bottom: 28px;
}

.office-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--radius-l);
  overflow: hidden;
}
@media (max-width: 980px) { .office-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 540px) { .office-grid { grid-template-columns: repeat(2, 1fr); } }

.office-card {
  background: var(--bg);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  cursor: pointer;
  transition: background .3s;
}
.office-card:hover, .office-card.active { background: var(--paper); }
.office-card .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--warm);
  transition: background .3s, transform .3s;
}
.office-card.active .dot { background: var(--cool); transform: scale(1.3); }
.office-card .city {
  font-size: 17px; font-weight: 600;
  letter-spacing: -0.01em;
}
.office-card .addr {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
  font-family: var(--font-mono);
  letter-spacing: .02em;
}

.map-canvas {
  position: relative;
  aspect-ratio: 1.05 / 1;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-l);
  padding: 32px;
  overflow: hidden;
}
.map-canvas svg { width: 100%; height: 100%; }
.map-canvas .pin {
  position: absolute;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--warm);
  border: 3px solid var(--paper);
  box-shadow: 0 0 0 0 oklch(0.72 0.15 60 / .6);
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: background .25s, transform .25s;
}
.map-canvas .pin:hover, .map-canvas .pin.active {
  background: var(--cool);
  transform: translate(-50%, -50%) scale(1.4);
  animation: pinPulse 1.6s ease-out infinite;
}
@keyframes pinPulse {
  0% { box-shadow: 0 0 0 0 oklch(0.58 0.18 245 / .5); }
  100% { box-shadow: 0 0 0 18px oklch(0.58 0.18 245 / 0); }
}
.map-canvas .pin .label {
  position: absolute;
  top: -36px; left: 50%;
  transform: translateX(-50%);
  background: var(--ink); color: var(--bg);
  font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em;
  padding: 5px 9px;
  border-radius: 6px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .2s;
}
.map-canvas .pin:hover .label, .map-canvas .pin.active .label { opacity: 1; }

/* ============================================================
   CTA
============================================================ */
.cta {
  padding: 0 32px 80px;
}
.cta-card {
  max-width: var(--max);
  margin: 0 auto;
  background: var(--ink);
  color: var(--bg);
  border-radius: var(--radius-xl);
  padding: 80px;
  position: relative;
  overflow: hidden;
}
@media (max-width: 720px) { .cta-card { padding: 48px 28px; } }

.cta-mesh {
  position: absolute;
  inset: 0;
  z-index: 0;
  opacity: .35;
}
.cta-mesh::before {
  content: "";
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--cool), transparent 60%);
  filter: blur(60px);
  top: -200px; right: -100px;
  animation: float 20s ease-in-out infinite;
}
.cta-mesh::after {
  content: "";
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--warm), transparent 60%);
  filter: blur(60px);
  bottom: -200px; left: -100px;
  animation: float 24s ease-in-out infinite;
  animation-delay: -8s;
}
.cta-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
}

.cta-inner {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 60px;
  align-items: end;
}
@media (max-width: 820px) { .cta-inner { grid-template-columns: 1fr; gap: 32px; } }

.cta-inner h2 {
  font-size: clamp(44px, 6vw, 92px);
  line-height: 0.98;
  letter-spacing: -0.04em;
  font-weight: 600;
}
.cta-inner h2 em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  color: var(--warm);
}
.cta-inner .blurb {
  color: rgba(246,244,239,.6);
  font-size: 16px;
  line-height: 1.55;
  margin-bottom: 18px;
}
.cta-inner .actions { display: flex; flex-direction: column; gap: 12px; }
.cta-btn {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 999px;
  font-size: 15px; font-weight: 500;
  transition: background .3s, transform .3s;
}
.cta-btn:hover { background: rgba(255,255,255,.06); transform: translateX(4px); }
.cta-btn.primary {
  background: var(--bg); color: var(--ink);
  border-color: var(--bg);
}
.cta-btn.primary:hover { background: var(--warm); border-color: var(--warm); }
.cta-btn .icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center;
}
.cta-btn.primary .icon { background: var(--ink); color: var(--bg); }

/* ============================================================
   Footer
============================================================ */
.footer {
  background: var(--bg);
  padding: 80px 0 40px;
  border-top: 1px solid var(--line);
}
.footer-top {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 40px;
  margin-bottom: 60px;
}
@media (max-width: 820px) {
  .footer-top { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 540px) {
  .footer-top { grid-template-columns: 1fr; }
}

.footer h5 {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  font-weight: 500;
}
.footer ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.footer ul a { font-size: 15px; color: var(--ink-2); transition: color .2s; }
.footer ul a:hover { color: var(--cool-deep); }

.footer-mark {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(52px, 9vw, 140px);
  line-height: 1.1;
  letter-spacing: -0.04em;
  color: var(--ink);
  margin: 0 0 40px;
  text-align: center;
  white-space: nowrap;
}

.footer-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  font-size: 13px;
  color: var(--muted);
  flex-wrap: wrap;
  gap: 16px;
}
.footer-bottom .legal { display: flex; gap: 24px; }

/* ============================================================
   Reduced motion
============================================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001s !important;
    transition-duration: 0.01s !important;
  }
  .reveal { opacity: 1; transform: none; }
}
</style>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

        {options.map((o) => {

          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (

             onChange={(e) => onChange(e.target.value)} />

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"

);

  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">

        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

// ── Stats ────────────────────────────────────────────────────────────────────

const useCountUp = (target, duration = 1600, start = false) => {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    if (!start) return;
    let raf, t0;
    const step = (t) => {
      if (!t0) t0 = t;
      const p = Math.min(1, (t - t0) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(target * eased));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [start, target, duration]);
  return val;
};

const Stats = () => {
  const ref = React.useRef(null);
  const [seen, setSeen] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) setSeen(true); });
    }, { threshold: 0.4 });
    io.observe(el);
    return () => io.disconnect();
  }, []);

  const yrs = useCountUp(50, 1400, seen);
  const proj = useCountUp(600, 1800, seen);
  const ton = useCountUp(240, 1800, seen);
  const cli = useCountUp(180, 1600, seen);

  return (
    <div className="container" ref={ref}>
      <div className="stats">
        <div className="stat">
          <div className="v">{yrs}<span className="unit">+ years</span></div>
          <div className="l">In commercial cooling</div>
        </div>
        <div className="stat">
          <div className="v">{proj}<span className="unit">+</span></div>
          <div className="l">Projects delivered</div>
        </div>
        <div className="stat">
          <div className="v">{ton}<span className="unit">k TR</span></div>
          <div className="l">Total tonnage installed</div>
        </div>
        <div className="stat">
          <div className="v">{cli}<span className="unit">+</span></div>
          <div className="l">Active clients</div>
        </div>
      </div>
    </div>
  );
};

// ── App ──────────────────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = {
  "accent": "#2A6FDB",
  "warmth": "#D97757",
  "marqueeSpeed": 40
};

const App = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--cool', t.accent);
    document.documentElement.style.setProperty('--warm', t.warmth);
  }, [t.accent, t.warmth]);

  React.useEffect(() => {
    const tracks = document.querySelectorAll('.marquee-track');
    tracks.forEach(el => { el.style.animationDuration = `${t.marqueeSpeed}s`; });
  }, [t.marqueeSpeed]);

  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav />
      <Hero />
      <Marquee />
      <Brands />
      <Services />
      <Projects />
      <Stats />
      <Values />
      <Clients />
      <Coverage />
      <CTA />
      <Footer />

      <TweaksPanel>
        <TweakSection label="Theme">
          <TweakColor
            label="Cool accent"
            value={t.accent}
            onChange={(v) => setTweak('accent', v)}
            options={['#2A6FDB', '#0EA5C9', '#1F8A5B', '#7A5AE0']}
          />
          <TweakColor
            label="Warm accent"
            value={t.warmth}
            onChange={(v) => setTweak('warmth', v)}
            options={['#D97757', '#E0633F', '#D9B26A', '#D9577A']}
          />
        </TweakSection>
        <TweakSection label="Motion">
          <TweakSlider
            label="Marquee speed"
            value={t.marqueeSpeed}
            min={15}
            max={80}
            step={1}
            onChange={(v) => setTweak('marqueeSpeed', v)}
            unit="s"
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
